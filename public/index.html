<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#08070c">
<meta name="description" content="Telegram Bots Dashboard — Chat, Projects, Search">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<title>Telegram Bots Dashboard — MaximoSEO</title>
<style>
:root{--bg:#08070c;--bg1:#0e0e16;--s1:#111118;--s2:#181822;--s3:#22222e;--b1:#27273a;--b2:#353548;--ac:#7c3aed;--ac2:#a78bfa;--gn:#10b981;--gn2:#34d399;--rd:#ef4444;--yl:#f59e0b;--pk:#ec4899;--bl:#3b82f6;--t1:#f1f5f9;--t2:#cbd5e1;--mt:#64748b;--r:14px;--rs:10px;--sh:0 4px 24px rgba(0,0,0,.4);--font:'Inter',-apple-system,system-ui,sans-serif;--mono:'JetBrains Mono',monospace}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--bg);color:var(--t1);min-height:100vh;overflow-x:hidden}
::selection{background:var(--ac);color:#fff}
:focus-visible{outline:2px solid var(--ac);outline-offset:2px}

/* Header */
.hdr{background:linear-gradient(135deg,#0f0f1a,#1a1030 50%,#0f1a2a);border-bottom:1px solid var(--b1);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.hdr .logo{display:flex;align-items:center;gap:10px}
.hdr .logo span{font-size:24px}
.hdr .logo h1{font-size:17px;font-weight:700;background:linear-gradient(135deg,var(--ac2),var(--pk));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hdr .rt{display:flex;gap:12px;align-items:center}
.pill{display:flex;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600}
.pill.online{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.2);color:var(--gn2)}
.pill.offline{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:var(--rd)}
.pill .dot{width:6px;height:6px;border-radius:50%;animation:pulse 2s infinite}
.pill.online .dot{background:var(--gn)}
.pill.offline .dot{background:var(--rd)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.clk{font-size:11px;color:var(--mt);font-variant-numeric:tabular-nums}

/* Layout */
.main{display:grid;grid-template-columns:280px 1fr 340px;height:calc(100vh - 52px)}

/* Sidebar — Bot List */
.sidebar{background:var(--s1);border-right:1px solid var(--b1);display:flex;flex-direction:column;overflow-y:auto}
.sidebar h2{padding:16px;font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--mt);font-weight:600}
.bot-item{padding:14px 16px;cursor:pointer;border-bottom:1px solid var(--b1);transition:all .2s;display:flex;align-items:center;gap:12px}
.bot-item:hover{background:var(--s2)}
.bot-item.active{background:var(--s2);border-left:3px solid var(--ac)}
.bot-icon{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.bot-info{flex:1;min-width:0}
.bot-name{font-weight:700;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bot-role{font-size:11px;color:var(--mt);margin-top:2px}
.bot-meta{display:flex;gap:8px;margin-top:4px}
.bot-badge{font-size:9px;padding:2px 6px;border-radius:4px;font-weight:600;text-transform:uppercase}
.badge-online{background:rgba(16,185,129,.15);color:var(--gn2)}
.badge-paused{background:rgba(245,158,11,.15);color:var(--yl)}
.badge-model{background:var(--s3);color:var(--mt);border:1px solid var(--b1)}

/* Center — Chat Area */
.chat-area{display:flex;flex-direction:column;background:var(--bg)}
.chat-header{padding:14px 20px;border-bottom:1px solid var(--b1);display:flex;align-items:center;gap:12px;background:var(--s1)}
.chat-header .bot-avatar{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px}
.chat-header .info h3{font-size:14px;font-weight:700}
.chat-header .info p{font-size:11px;color:var(--mt)}
.chat-messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:12px}
.msg{max-width:80%;padding:10px 14px;border-radius:12px;font-size:13px;line-height:1.5;word-wrap:break-word}
.msg.user{align-self:flex-end;background:var(--ac);color:#fff;border-bottom-right-radius:4px}
.msg.bot{align-self:flex-start;background:var(--s2);border:1px solid var(--b1);border-bottom-left-radius:4px}
.msg .time{font-size:9px;color:rgba(255,255,255,.5);margin-top:4px;display:block}
.msg.bot .time{color:var(--mt)}
.msg.system{align-self:center;background:var(--s1);border:1px dashed var(--b1);font-size:11px;color:var(--mt);padding:6px 12px}
.chat-input{padding:14px 20px;border-top:1px solid var(--b1);display:flex;gap:10px;background:var(--s1)}
.chat-input input{flex:1;background:var(--bg);border:1px solid var(--b1);border-radius:var(--rs);padding:10px 14px;color:var(--t1);font-size:13px;font-family:inherit}
.chat-input input:focus{outline:none;border-color:var(--ac)}
.chat-input button{background:var(--ac);color:#fff;border:none;border-radius:var(--rs);padding:10px 16px;font-weight:700;cursor:pointer;font-family:inherit;font-size:13px}
.chat-input button:hover{background:#6d28d9}

/* Right Panel — Projects & Search */
.right-panel{background:var(--s1);border-left:1px solid var(--b1);display:flex;flex-direction:column;overflow-y:auto}
.right-panel .tabs{display:flex;border-bottom:1px solid var(--b1)}
.right-panel .tab{flex:1;padding:12px;text-align:center;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;color:var(--mt)}
.right-panel .tab:hover{color:var(--t1)}
.right-panel .tab.active{color:var(--ac2);border-bottom:2px solid var(--ac)}
.search-box{padding:12px;border-bottom:1px solid var(--b1)}
.search-box input{width:100%;background:var(--bg);border:1px solid var(--b1);border-radius:var(--rs);padding:8px 12px;color:var(--t1);font-size:12px;font-family:inherit}
.search-box input:focus{outline:none;border-color:var(--ac)}
.project-list{flex:1;overflow-y:auto}
.project-item{padding:12px 14px;border-bottom:1px solid var(--b1);cursor:pointer;transition:background .15s}
.project-item:hover{background:var(--s2)}
.project-item h4{font-size:13px;font-weight:600;margin-bottom:4px}
.project-item p{font-size:11px;color:var(--mt);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.project-item .meta{display:flex;gap:8px;margin-top:6px;font-size:10px;color:var(--mt)}
.project-item .meta .tag{padding:2px 6px;border-radius:4px;background:var(--s3);border:1px solid var(--b1)}

/* Stats Panel */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:12px}
.stat-card{background:var(--s2);border:1px solid var(--b1);border-radius:var(--rs);padding:12px;text-align:center}
.stat-card .num{font-size:22px;font-weight:800}
.stat-card .label{font-size:10px;color:var(--mt);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.stat-card.green .num{color:var(--gn2)}
.stat-card.blue .num{color:var(--ac2)}
.stat-card.yellow .num{color:var(--yl)}
.stat-card.red .num{color:var(--rd)}

/* Empty States */
.empty{text-align:center;padding:40px 20px;color:var(--mt)}
.empty .icon{font-size:40px;opacity:.5;margin-bottom:8px}
.empty p{font-size:12px}

/* Toast */
.toast{position:fixed;bottom:20px;right:20px;background:var(--s2);border:1px solid var(--b1);border-radius:var(--rs);padding:10px 18px;font-size:12px;z-index:999;transform:translateY(80px);opacity:0;transition:all .3s;box-shadow:var(--sh)}
.toast.show{transform:translateY(0);opacity:1}
.toast.success{border-color:var(--gn)}
.toast.error{border-color:var(--rd)}

/* Responsive */
@media(max-width:900px){.main{grid-template-columns:1fr}.sidebar,.right-panel{display:none}}
</style>
</head>
<body>

<div class="hdr">
  <div class="logo"><span>🤖</span><h1>Telegram Bots Dashboard</h1></div>
  <div class="rt">
    <div class="pill online" id="statusPill"><div class="dot"></div><span id="statusText">Connected</span></div>
    <div class="clk" id="clk"></div>
  </div>
</div>

<div class="main">
  <!-- Sidebar: Bot List -->
  <div class="sidebar">
    <h2>🤖 Bots</h2>
    <div id="botList"></div>
    <div style="padding:16px;margin-top:auto">
      <div class="stat-card green"><div class="num" id="totalBots">4</div><div class="label">Active Bots</div></div>
    </div>
  </div>

  <!-- Center: Chat Area -->
  <div class="chat-area">
    <div class="chat-header" id="chatHeader">
      <div class="bot-avatar" id="chatAvatar" style="background:var(--s3)">🤖</div>
      <div class="info">
        <h3 id="chatBotName">Select a bot</h3>
        <p id="chatBotRole">Choose a bot from the sidebar to start chatting</p>
      </div>
    </div>
    <div class="chat-messages" id="chatMessages">
      <div class="empty"><div class="icon">💬</div><p>Select a bot to view conversation history</p></div>
    </div>
    <div class="chat-input">
      <input type="text" id="chatInput" placeholder="Type a message..." disabled>
      <button id="sendBtn" disabled onclick="sendMessage()">Send</button>
    </div>
  </div>

  <!-- Right Panel: Projects & Stats -->
  <div class="right-panel">
    <div class="tabs">
      <div class="tab active" onclick="switchTab('projects')">📁 Projects</div>
      <div class="tab" onclick="switchTab('stats')">📊 Stats</div>
    </div>
    
    <!-- Projects Tab -->
    <div id="projectsTab">
      <div class="search-box">
        <input type="text" id="projectSearch" placeholder="🔍 Search projects..." oninput="filterProjects()">
      </div>
      <div class="project-list" id="projectList">
        <div class="empty"><div class="icon">📁</div><p>No projects yet</p></div>
      </div>
    </div>

    <!-- Stats Tab -->
    <div id="statsTab" style="display:none">
      <div class="stats-grid">
        <div class="stat-card blue"><div class="num" id="statConvos">-</div><div class="label">Conversations</div></div>
        <div class="stat-card green"><div class="num" id="statMessages">-</div><div class="label">Messages</div></div>
        <div class="stat-card yellow"><div class="num" id="statTokens">-</div><div class="label">Tokens Used</div></div>
        <div class="stat-card red"><div class="num" id="statCost">-</div><div class="label">Cost ($)</div></div>
      </div>
      <div style="padding:12px">
        <h4 style="font-size:12px;color:var(--mt);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px">Per Bot Breakdown</h4>
        <div id="botStats"></div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// Bot definitions (matching Paperclip + Telegram Command Center)
const BOTS = [
  { id: 'nous', name: 'HemesL64 Bot', username: '@HemesL64Bot', icon: '🧠', color: '#10b981', model: 'Nous', role: 'General Purpose', capabilities: ['coding','research','planning','automation'], supabaseId: '7e3c5278-f01f-4c62-9d8a-aba2599982e0' },
  { id: 'claude', name: 'HermesClaude64 Bot', username: '@HermesClaude64Bot', icon: '🎯', color: '#3b82f6', model: 'Claude', role: 'Advanced Reasoning', capabilities: ['analysis','coding','writing','problem-solving'], supabaseId: 'c186e227-6ff6-4f9e-8906-5867e1f14224' },
  { id: 'nous2', name: 'HermesNous64 Bot', username: '@HermesNous64Bot', icon: '⚡', color: '#ec4899', model: 'Nous', role: 'Fast & Efficient', capabilities: ['content-creation','automation','multi-task'], supabaseId: '594619d9-e765-4d82-b289-953390aa6d0a' },
  { id: 'codex', name: 'HermesCodexNew64 Bot', username: '@HermesCodexNew64Bot', icon: '💻', color: '#f59e0b', model: 'Codex', role: 'Code Generation', capabilities: ['development','debugging','refactoring','testing'], supabaseId: '630b8adc-0756-41e3-91a8-88bd0ff1443d' }
];

let activeBot = null;
let conversations = [];
let projects = [];

// Clock
function updateClock() {
  document.getElementById('clk').textContent = new Date().toLocaleTimeString('en-GB', { hour12: false });
}
updateClock(); setInterval(updateClock, 1000);

// Render bot list
function renderBots() {
  document.getElementById('botList').innerHTML = BOTS.map(b => `
    <div class="bot-item${activeBot?.id === b.id ? ' active' : ''}" onclick="selectBot('${b.id}')">
      <div class="bot-icon" style="background:${b.color}20;color:${b.color}">${b.icon}</div>
      <div class="bot-info">
        <div class="bot-name">${b.name}</div>
        <div class="bot-role">${b.role}</div>
        <div class="bot-meta">
          <span class="bot-badge badge-online">online</span>
          <span class="bot-badge badge-model">${b.model}</span>
        </div>
      </div>
    </div>
  `).join('');
}

// Select bot
async function selectBot(id) {
  activeBot = BOTS.find(b => b.id === id);
  renderBots();
  
  // Update chat header
  document.getElementById('chatAvatar').textContent = activeBot.icon;
  document.getElementById('chatAvatar').style.background = activeBot.color + '20';
  document.getElementById('chatBotName').textContent = activeBot.name;
  document.getElementById('chatBotRole').textContent = `${activeBot.username} · ${activeBot.model} · ${activeBot.role}`;
  
  // Enable input
  document.getElementById('chatInput').disabled = false;
  document.getElementById('sendBtn').disabled = false;
  
  // Load conversation history
  await loadConversation(id);
  await loadProjects(id);
  await loadStats(id);
}

// Load conversation from Supabase
async function loadConversation(botId) {
  const bot = BOTS.find(b => b.id === botId);
  const el = document.getElementById('chatMessages');
  el.innerHTML = '<div class="empty"><div class="icon">⏳</div><p>Loading conversation...</p></div>';
  
  try {
    // Fetch messages from the messages table for this bot
    const resp = await fetch(`/api/sb/messages?bot_id=eq.${bot.supabaseId}&order=created_at.desc&limit=50`);
    const msgs = await resp.json();
    
    if (!Array.isArray(msgs) || !msgs.length) {
      el.innerHTML = `<div class="empty"><div class="icon">${bot.icon}</div><p>No messages yet with ${bot.name}</p><p style="font-size:10px;margin-top:8px;color:var(--b2)">Start a conversation on Telegram: ${bot.username}</p></div>`;
      return;
    }
    
    el.innerHTML = msgs.reverse().map(m => {
      const isUser = m.role === 'user';
      const time = new Date(m.created_at).toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
      return `<div class="msg ${isUser ? 'user' : 'bot'}">${escapeHtml(m.content || m.text || '')}<span class="time">${time}</span></div>`;
    }).join('');
    
    el.scrollTop = el.scrollHeight;
  } catch (e) {
    el.innerHTML = `<div class="empty"><div class="icon">⚠️</div><p>Failed to load conversation</p><p style="font-size:10px">${e.message}</p></div>`;
  }
}

// Load projects from Supabase
async function loadProjects(botId) {
  const el = document.getElementById('projectList');
  try {
    let url = '/api/sb/conversations?order=updated_at.desc&limit=50';
    if (botId) {
      const bot = BOTS.find(b => b.id === botId);
      url = `/api/sb/conversations?bot_id=eq.${bot.supabaseId}&order=updated_at.desc&limit=50`;
    }
    const resp = await fetch(url);
    const convos = await resp.json();
    projects = Array.isArray(convos) ? convos : [];
    
    if (!projects.length) {
      el.innerHTML = '<div class="empty"><div class="icon">📁</div><p>No conversations yet</p></div>';
      return;
    }
    
    renderProjects(projects);
  } catch (e) {
    el.innerHTML = `<div class="empty"><div class="icon">⚠️</div><p>Failed to load</p></div>`;
  }
}

function renderProjects(items) {
  const el = document.getElementById('projectList');
  el.innerHTML = items.map(c => {
    const bot = BOTS.find(b => b.supabaseId === c.bot_id);
    const ago = timeAgo(c.updated_at || c.created_at);
    return `
      <div class="project-item" onclick="openProject('${c.id}')">
        <h4>${escapeHtml(c.title || c.topic || 'Untitled')}</h4>
        <p>${escapeHtml(c.last_message || c.summary || c.description || '')}</p>
        <div class="meta">
          ${bot ? `<span class="tag">${bot.icon} ${bot.name}</span>` : ''}
          <span>${ago}</span>
          ${c.message_count ? `<span>${c.message_count} msgs</span>` : ''}
        </div>
      </div>
    `;
  }).join('');
}

function filterProjects() {
  const q = document.getElementById('projectSearch').value.toLowerCase();
  if (!q) { renderProjects(projects); return; }
  const filtered = projects.filter(p => 
    (p.title || '').toLowerCase().includes(q) ||
    (p.topic || '').toLowerCase().includes(q) ||
    (p.last_message || '').toLowerCase().includes(q) ||
    (p.summary || '').toLowerCase().includes(q)
  );
  renderProjects(filtered);
}

// Load stats
async function loadStats(botId) {
  try {
    // Fetch stats
    const [convosResp, msgsResp, llmResp] = await Promise.all([
      fetch('/api/sb/conversations?select=count'),
      fetch('/api/sb/messages?select=count'),
      fetch('/api/sb/llm_calls?select=tokens_in,tokens_out,cost_usd')
    ]);
    
    const convos = await convosResp.json();
    const msgs = await msgsResp.json();
    const llmCalls = await llmResp.json();
    
    document.getElementById('statConvos').textContent = Array.isArray(convos) ? convos.length : '-';
    document.getElementById('statMessages').textContent = Array.isArray(msgs) ? msgs.length : '-';
    
    if (Array.isArray(llmCalls)) {
      const totalTokens = llmCalls.reduce((s, c) => s + (c.tokens_in || 0) + (c.tokens_out || 0), 0);
      const totalCost = llmCalls.reduce((s, c) => s + (c.cost_usd || 0), 0);
      document.getElementById('statTokens').textContent = totalTokens > 1000 ? (totalTokens/1000).toFixed(1) + 'K' : totalTokens;
      document.getElementById('statCost').textContent = '$' + totalCost.toFixed(2);
    }
    
    // Per-bot stats
    renderBotStats(llmCalls);
  } catch (e) {
    console.error('Stats error:', e);
  }
}

function renderBotStats(llmCalls) {
  const el = document.getElementById('botStats');
  if (!Array.isArray(llmCalls)) { el.innerHTML = ''; return; }
  
  const byBot = {};
  llmCalls.forEach(c => {
    const bid = c.bot_id;
    if (!byBot[bid]) byBot[bid] = { tokens: 0, cost: 0, calls: 0 };
    byBot[bid].tokens += (c.tokens_in || 0) + (c.tokens_out || 0);
    byBot[bid].cost += (c.cost_usd || 0);
    byBot[bid].calls++;
  });
  
  el.innerHTML = BOTS.map(b => {
    const stats = byBot[b.supabaseId] || { tokens: 0, cost: 0, calls: 0 };
    return `
      <div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--b1)">
        <span style="font-size:18px">${b.icon}</span>
        <div style="flex:1">
          <div style="font-size:12px;font-weight:600">${b.name}</div>
          <div style="font-size:10px;color:var(--mt)">${stats.calls} calls · ${stats.tokens > 1000 ? (stats.tokens/1000).toFixed(1)+'K' : stats.tokens} tokens</div>
        </div>
        <div style="font-size:13px;font-weight:700;color:var(--gn2)">$${stats.cost.toFixed(2)}</div>
      </div>
    `;
  }).join('');
}

// Send message (via Telegram webhook or direct API)
async function sendMessage() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text || !activeBot) return;
  
  input.value = '';
  
  // Add user message to chat
  addMessage('user', text);
  
  // Store in Supabase
  try {
    await fetch('/api/sb/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        bot_id: activeBot.supabaseId,
        role: 'user',
        content: text,
        created_at: new Date().toISOString()
      })
    });
  } catch (e) {
    console.error('Store error:', e);
  }
  
  // Show typing indicator
  addMessage('system', `${activeBot.icon} ${activeBot.name} is thinking...`);
  
  // In production, this would trigger the bot via Telegram API
  // For now, simulate a response
  setTimeout(() => {
    removeSystemMessages();
    addMessage('bot', `I received your message: "${text}". This is a preview — full bot responses will be connected via Telegram webhook.`);
  }, 1500);
}

function addMessage(type, text) {
  const el = document.getElementById('chatMessages');
  const time = new Date().toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
  const div = document.createElement('div');
  div.className = `msg ${type}`;
  div.innerHTML = `${escapeHtml(text)}<span class="time">${time}</span>`;
  el.appendChild(div);
  el.scrollTop = el.scrollHeight;
}

function removeSystemMessages() {
  document.querySelectorAll('.msg.system').forEach(el => el.remove());
}

// Open project detail
async function openProject(id) {
  try {
    const resp = await fetch(`/api/sb/conversations?id=eq.${id}&select=*`);
    const data = await resp.json();
    if (data.length) {
      const c = data[0];
      // Load messages for this conversation
      const msgsResp = await fetch(`/api/sb/messages?conversation_id=eq.${id}&order=created_at.asc&limit=100`);
      const msgs = await msgsResp.json();
      
      const el = document.getElementById('chatMessages');
      el.innerHTML = `<div class="msg system">📁 ${escapeHtml(c.title || c.topic || 'Conversation')}</div>` +
        (Array.isArray(msgs) ? msgs.map(m => {
          const isUser = m.role === 'user';
          const time = new Date(m.created_at).toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
          return `<div class="msg ${isUser ? 'user' : 'bot'}">${escapeHtml(m.content || m.text || '')}<span class="time">${time}</span></div>`;
        }).join('') : '');
    }
  } catch (e) {
    showToast('Failed to load project', 'error');
  }
}

// Tab switching
function switchTab(tab) {
  document.querySelectorAll('.right-panel .tab').forEach(t => t.classList.remove('active'));
  document.getElementById('projectsTab').style.display = tab === 'projects' ? '' : 'none';
  document.getElementById('statsTab').style.display = tab === 'stats' ? '' : 'none';
  event.target.classList.add('active');
}

// Utilities
function escapeHtml(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }
function timeAgo(s) {
  if (!s) return '';
  const d = (Date.now() - new Date(s).getTime()) / 1000;
  if (d < 60) return 'just now';
  if (d < 3600) return Math.floor(d/60) + 'm ago';
  if (d < 86400) return Math.floor(d/3600) + 'h ago';
  return Math.floor(d/86400) + 'd ago';
}
function showToast(msg, type='success') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `toast ${type} show`;
  setTimeout(() => el.classList.remove('show'), 3000);
}

// Enter key to send
document.getElementById('chatInput').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

// Init
renderBots();
selectBot('nous');
</script>
</body>
</html>
